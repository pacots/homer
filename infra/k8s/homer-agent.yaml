apiVersion: apps/v1
kind: Deployment
metadata:
  name: homer-agent
  namespace: homer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homer-agent
  template:
    metadata:
      labels:
        app: homer-agent
    spec:
      containers:
        - name: homer-agent
          image: homer-agent:0.1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: OLLAMA_HOST
              value: "http://homer-llm:11434"
            - name: OLLAMA_MODEL
              value: "llama3.2:3b"
---
apiVersion: v1
kind: Service
metadata:
  name: homer-agent
  namespace: homer
spec:
  type: NodePort
  selector:
    app: homer-agent
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30081