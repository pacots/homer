apiVersion: v1
kind: Namespace
metadata:
  name: homer
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: homer-llm-data
  namespace: homer
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homer-llm
  namespace: homer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homer-llm
  template:
    metadata:
      labels:
        app: homer-llm
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 11434
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0:11434"
          volumeMounts:
            - name: homer-llm-data
              mountPath: /root/.ollama
          resources:
            requests:
              memory: "2Gi"
              cpu: "1"
            limits:
              memory: "6Gi"
              cpu: "3"
      volumes:
        - name: homer-llm-data
          persistentVolumeClaim:
            claimName: homer-llm-data
---
apiVersion: v1
kind: Service
metadata:
  name: homer-llm
  namespace: homer
spec:
  type: NodePort
  selector:
    app: homer-llm
  ports:
    - name: http
      port: 11434
      targetPort: 11434
      nodePort: 31434