apiVersion: apps/v1
kind: Deployment
metadata:
  name: homer-open-webui
  namespace: homer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homer-open-webui
  template:
    metadata:
      labels:
        app: homer-open-webui
    spec:
      containers:
        - name: homer-open-webui
          image: ghcr.io/open-webui/open-webui:main
          ports:
            - containerPort: 8080
          env:
            - name: OLLAMA_BASE_URL
              value: "http://homer-llm:11434"
            - name: WEBUI_AUTH
              value: "false"
          resources:
            requests:
              memory: "2Gi"
              cpu: "1"
            limits:
              memory: "3Gi"
              cpu: "2"

---
apiVersion: v1
kind: Service
metadata:
  name: homer-open-webui
  namespace: homer
spec:
  selector:
    app: homer-open-webui
  type: NodePort
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30080
